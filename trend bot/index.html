<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrendSage AI | Social Trend Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }

        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .trend-up {
            color: #10b981;
        }

        .trend-down {
            color: #ef4444;
        }

        .animate-fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="min-h-screen p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div>
                <h1
                    class="text-3xl font-bold bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">
                    TrendSage AI Dash</h1>
                <p class="text-slate-400 text-sm">Real-time Social Intelligence & Trend Monitoring</p>
            </div>
            <div class="flex gap-4">
                <button onclick="refreshData()"
                    class="glass px-4 py-2 rounded-lg flex items-center gap-2 hover:bg-slate-700 transition">
                    <i data-lucide="refresh-cw" id="refresh-icon" class="w-4 h-4"></i> Full Refresh
                </button>
                <div class="glass px-4 py-2 rounded-lg flex items-center gap-2 text-emerald-400">
                    <span class="relative flex h-3 w-3">
                        <span
                            class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                    </span>
                    Live Engine
                </div>
            </div>
        </header>

        <!-- Stats Grid -->
        <div id="stats-grid" class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <!-- Stats will be injected here -->
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Trend List -->
            <div class="lg:col-span-2 space-y-4">
                <h2 class="text-xl font-semibold flex items-center gap-2 mb-4">
                    <i data-lucide="trending-up" class="w-5 h-5 text-blue-400"></i> Top Semantic Clusters
                </h2>
                <div id="trend-container" class="space-y-4">
                    <!-- Trends will be injected here -->
                </div>
            </div>

            <!-- Chatbot / Insights -->
            <div class="space-y-6">
                <!-- Risk Alerts -->
                <div id="risk-alerts" class="space-y-4"></div>

                <!-- Chatbot UI -->
                <div class="glass rounded-2xl overflow-hidden flex flex-col h-[500px]">
                    <div class="p-4 bg-slate-800 flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center">
                            <i data-lucide="bot" class="w-5 h-5 text-white"></i>
                        </div>
                        <div>
                            <p class="font-medium">TrendSage Assistant</p>
                            <p class="text-xs text-slate-400">Context: Provided Data</p>
                        </div>
                    </div>
                    <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4 text-sm">
                        <div
                            class="bg-slate-700/50 p-3 rounded-tr-xl rounded-bl-xl rounded-br-xl max-w-[85%] animate-fade-in">
                            Hello! I'm TrendSage. Ask me about sentiment, platforms, or specific trends in your data.
                        </div>
                    </div>
                    <div class="p-4 border-t border-white/5">
                        <div class="relative">
                            <input id="chat-input" type="text" placeholder="Ask about trends..."
                                class="w-full bg-slate-900 border border-white/10 rounded-xl px-4 py-3 pr-12 focus:border-blue-500 outline-none transition">
                            <button onclick="sendMessage()"
                                class="absolute right-2 top-2 p-2 text-blue-400 hover:text-blue-300">
                                <i data-lucide="send" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function refreshData() {
            const icon = document.getElementById('refresh-icon');
            icon.classList.add('animate-spin');
            try {
                await fetch('/api/refresh');
                await fetchData();
            } finally {
                setTimeout(() => icon.classList.remove('animate-spin'), 1000);
            }
        }

        async function fetchData() {
            try {
                const res = await fetch('/api/trends');
                const data = await res.json();
                renderDashboard(data);
            } catch (err) {
                console.error("Failed to fetch data", err);
            }
        }

        function renderDashboard(data) {
            const container = document.getElementById('trend-container');
            const statsGrid = document.getElementById('stats-grid');
            const riskContainer = document.getElementById('risk-alerts');

            // Render Stats
            const totalVolume = data.topics.reduce((acc, t) => acc + t.volume, 0);
            const totalEngagement = data.topics.reduce((acc, t) => acc + t.engagement, 0);
            const viralCount = data.topics.filter(t => t.trend.includes('Viral')).length;

            statsGrid.innerHTML = `
                <div class="glass p-6 rounded-2xl">
                    <p class="text-slate-400 text-sm mb-1 uppercase tracking-wider font-semibold">Total Posts</p>
                    <p class="text-3xl font-bold">${totalVolume}</p>
                </div>
                <div class="glass p-6 rounded-2xl">
                    <p class="text-slate-400 text-sm mb-1 uppercase tracking-wider font-semibold">Viral Topics</p>
                    <p class="text-3xl font-bold text-orange-400">${viralCount}</p>
                </div>
                <div class="glass p-6 rounded-2xl">
                    <p class="text-slate-400 text-sm mb-1 uppercase tracking-wider font-semibold">Total Engagement</p>
                    <p class="text-3xl font-bold text-blue-400">${(totalEngagement / 1000).toFixed(1)}K</p>
                </div>
                <div class="glass p-6 rounded-2xl">
                    <p class="text-slate-400 text-sm mb-1 uppercase tracking-wider font-semibold">Insights Found</p>
                    <p class="text-3xl font-bold text-emerald-400">${data.insights.opportunities.length + data.insights.risk_alerts.length}</p>
                </div>
            `;

            // Render Trends
            container.innerHTML = data.topics.map(t => `
                <div class="glass p-6 rounded-2xl hover:bg-slate-800/50 transition animate-fade-in">
                    <div class="flex flex-col md:flex-row justify-between gap-4">
                        <div class="flex-1">
                            <div class="flex items-center gap-3 mb-2">
                                <span class="px-2 py-1 bg-blue-500/20 text-blue-400 rounded text-xs font-bold uppercase">${t.trend}</span>
                                <h3 class="text-xl font-bold">${t.topic}</h3>
                            </div>
                            <p class="text-slate-400 text-sm leading-relaxed">${t.summary}</p>
                            <div class="flex gap-4 mt-4 text-xs font-medium text-slate-500">
                                <span class="flex items-center gap-1"><i data-lucide="share-2" class="w-3 h-3"></i> ${t.platforms.join(', ')}</span>
                                <span class="flex items-center gap-1"><i data-lucide="thumbs-up" class="w-3 h-3"></i> ${t.engagement.toLocaleString()}</span>
                            </div>
                        </div>
                        <div class="flex flex-col items-end justify-center min-w-[120px]">
                            <p class="text-xs text-slate-500 uppercase mb-1">Sentiment</p>
                            <div class="flex gap-1 h-2 w-24 bg-slate-700 rounded-full overflow-hidden">
                                <div class="bg-emerald-500" style="width: ${t.sentiment.positive * 100}%"></div>
                                <div class="bg-slate-400" style="width: ${t.sentiment.neutral * 100}%"></div>
                                <div class="bg-rose-500" style="width: ${t.sentiment.negative * 100}%"></div>
                            </div>
                            <p class="text-emerald-400 font-bold mt-2">+${(t.growth * 100).toFixed(1)}%</p>
                        </div>
                    </div>
                </div>
            `).join('');

            // Render Risks
            riskContainer.innerHTML = data.insights.risk_alerts.map(r => {
                const isCritical = r.severity === 'CRITICAL';
                return `
                <div class="${isCritical ? 'bg-rose-600 animate-pulse border-2 border-white' : 'bg-rose-500/10 border border-rose-500/20'} p-4 rounded-xl shadow-lg">
                    <div class="flex items-center gap-2 ${isCritical ? 'text-white' : 'text-rose-400'} font-black text-sm uppercase mb-1">
                        <i data-lucide="${isCritical ? 'skull' : 'alert-triangle'}" class="w-4 h-4"></i> 
                        ${isCritical ? 'CRITICAL HIGH ALERT' : 'RISK ALERT'}
                    </div>
                    <p class="text-sm ${isCritical ? 'text-white' : 'text-rose-100'} font-medium">${r.insight}</p>
                    <p class="text-xs ${isCritical ? 'text-white/80' : 'text-rose-300/70'} mt-2 font-bold italic uppercase tracking-tighter">Action: ${r.action}</p>
                </div>
            `}).join('');

            lucide.createIcons();
        }

        function formatChatText(text) {
            // Simple bolding support for markdown-like syntax
            return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const messages = document.getElementById('chat-messages');
            const text = input.value.trim();
            if (!text) return;

            // User Message
            messages.innerHTML += `
                <div class="ml-auto bg-blue-600 p-3 rounded-tl-xl rounded-bl-xl rounded-br-xl max-w-[85%] animate-fade-in text-white shadow-lg">
                    ${text}
                </div>
            `;
            input.value = '';

            // Typing Indicator
            const typingId = 'typing-' + Date.now();
            messages.innerHTML += `
                <div id="${typingId}" class="flex items-center gap-2 text-slate-500 animate-pulse ml-2 py-2">
                    <div class="w-1.5 h-1.5 bg-slate-500 rounded-full"></div>
                    <div class="w-1.5 h-1.5 bg-slate-500 rounded-full"></div>
                    <div class="w-1.5 h-1.5 bg-slate-500 rounded-full"></div>
                </div>
            `;
            messages.scrollTop = messages.scrollHeight;

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });

                if (!res.ok) throw new Error("Server error");

                const data = await res.json();

                // Remove Typing Indicator
                const typingIndicator = document.getElementById(typingId);
                if (typingIndicator) typingIndicator.remove();

                // AI Response
                messages.innerHTML += `
                    <div class="flex flex-col gap-1 items-start max-w-[90%] animate-fade-in">
                        <span class="text-[10px] text-slate-500 ml-1 font-bold uppercase tracking-tighter">TrendSage AI</span>
                        <div class="bg-slate-700/50 p-3.5 rounded-tr-2xl rounded-bl-2xl rounded-br-2xl border border-white/5 leading-relaxed text-sm text-slate-100 shadow-xl">
                            ${formatChatText(data.response)}
                        </div>
                    </div>
                `;
                messages.scrollTop = messages.scrollHeight;
            } catch (err) {
                console.error(err);
                const typingIndicator = document.getElementById(typingId);
                if (typingIndicator) typingIndicator.remove();

                messages.innerHTML += `
                    <div class="bg-rose-500/10 border border-rose-500/20 text-rose-400 p-3 rounded-lg text-xs italic">
                        Sorry, I'm having trouble connecting to the brain. Please check if the backend is running!
                    </div>
                `;
            }
        }

        document.getElementById('chat-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Initial Load
        fetchData();
        lucide.createIcons();
    </script>
</body>

</html>
